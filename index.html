<!DOCTYPE html>
<html>
<head>
	<base href="./"/>
	<title>Drift Boss</title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no"/>
	<link rel="stylesheet" type="text/css" href="game.css"/>
	<script>
		window.MobileAdInGamePreroll={Close:function(){}};
		window.MobileAdInGameEnd={Close:function(){}};
		window.ig = { gd: { show: function(cb){ if(cb) setTimeout(cb,100); }, close: function(){}, ready: false } };
		window.gdApi=null;
		window.GameDistribution=null;
	</script>
	<script src="game.js"></script>
	<script>
		(function triggerStart() {
			if (window.GD_OPTIONS && window.GD_OPTIONS.onEvent) {
				window.GD_OPTIONS.onEvent({ name: 'SDK_READY' });
			} else {
				setTimeout(triggerStart, 200);
			}
		})();
		(function skipBranding() {
			var check = setInterval(function() {
				if (!window.ig || !ig.game || !ig.game.spawnEntity) return;
				var orig = ig.game.spawnEntity;
				ig.game.spawnEntity = function(type, x, y) {
					var name = (type && type.name) || (type && type.prototype && type.prototype.constructor && type.prototype.constructor.name) || '';
					if (name && name.toLowerCase().indexOf('branding') >= 0) return null;
					return orig.apply(this, arguments);
				};
				ig.game.goToLevel('MainMenu');
				clearInterval(check);
			}, 500);
		})();
	</script>
</head>
<body onload="setTimeout(function(){window.scrollTo(0,1)},1);">
	<div id="ajaxbar">
		<div id="game"><canvas id="canvas"></canvas></div>
		<div id="webgl"><canvas id="webglcanvas"></canvas></div>
		<div id="orientate"><img src="media/graphics/orientate/landscape.jpg" /></div>
		<div id="play" class="play" onclick=""><img src="media/graphics/splash/mobile/cover-start.jpg" /></div>
	</div>
</body>
</html>
