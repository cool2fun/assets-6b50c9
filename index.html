<!DOCTYPE html>
<html>
<head>
	<base href="./"/>
	<title>Drift Boss</title>
	<meta charset="utf-8"/>
	<meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no"/>
	<link rel="stylesheet" type="text/css" href="game.css"/>
	<script>
		window.MobileAdInGamePreroll = {Close:function(){}};
		window.MobileAdInGameEnd = {Close:function(){}};
		window.GameDistribution = null;
		window.gdApi = null;
		window.gdsdk = {
			play: function(){},
			showAd: function(){ return Promise.resolve(); },
			preloadAd: function(){ return Promise.resolve(true); },
			isAvailable: function(){ return true; },
			isAvailableRewarded: function(){ return true; },
			showRewarded: function(cb){ if(cb) cb(true); },
			close: function(){}
		};
		window.ig = {
			gd: {
				show: function(cb){ if(cb) cb(); },
				close: function(){},
				ready: true,
				freez: function(){},
				unfreez: function(){},
				showRewarded: function(cb){ if(cb) cb(true); },
				isFreez: 0,
				adShowing: 0
			}
		};
	</script>
	<script>
		// Block main.min.js injection
		var _origCreate = document.createElement.bind(document);
		document.createElement = function(tag) {
			var el = _origCreate(tag);
			if (tag === 'script') {
				var origSet = el.setAttribute.bind(el);
				el.setAttribute = function(k, v) {
					if (k === 'src' && typeof v === 'string' && v.indexOf('main.min') >= 0) return;
					return origSet(k, v);
				};
			}
			return el;
		};
	</script>
	<script src="game.js"></script>
	<script>
		// Trigger SDK_READY
		(function trigger(){
			if (window.GD_OPTIONS && window.GD_OPTIONS.onEvent) {
				window.GD_OPTIONS.onEvent({ name: 'SDK_READY' });
			} else { setTimeout(trigger, 200); }
		})();

		// After game init, skip tap-to-start + branding, force MainMenu
		var _count = 0;
		var _patch = setInterval(function() {
			_count++;
			if (!ig || !ig.game) return;
			var g = ig.game;
			if (g.tapToStartDiv) g.tapToStartDiv = function(cb){ if(cb) cb(); };
			if (g._drawStatus !== undefined && g._drawStatus < 1) g._drawStatus = 999;
			if (g.status !== undefined && g.status < 1) g.status = 999;
			if (g.startBabylonIfReady) {
				g.startBabylonIfReady = function() {
					g.status = 999;
					setTimeout(function() {
						if (g.startRender) g.startRender();
						g._drawStatus = 999;
						if (ig.system && ig.system.setGame && typeof MyGame !== 'undefined') {
							ig.system.setGame(MyGame);
						} else if (g.director && g.director.levels && g.director.levels.length > 0) {
							g.director.loadLevel(0);
						}
					}, 100);
				};
			}
			if (_count >= 50) clearInterval(_patch);
		}, 300);
	</script>
</head>
<body onload="setTimeout(function(){window.scrollTo(0,1)},1);">
	<div id="ajaxbar">
		<div id="game"><canvas id="canvas"></canvas></div>
		<div id="webgl"><canvas id="webglcanvas"></canvas></div>
		<div id="orientate"><img src="media/graphics/orientate/landscape.jpg" /></div>
		<div id="play" class="play" onclick=""><img src="media/graphics/splash/mobile/cover-start.jpg" /></div>
	</div>
</body>
</html>
